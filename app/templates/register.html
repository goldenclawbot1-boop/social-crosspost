{% extends "base.html" %}
{% block title %}Register — {{ app_name }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="card p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Create your account</h1>
        <form
            hx-post="/auth/register"
            hx-target="this"
            hx-swap="outerHTML"
            class="space-y-4"
        >
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                <input type="text" name="name" class="input-field" placeholder="Your name">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required class="input-field" placeholder="you@example.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required minlength="6" class="input-field" placeholder="At least 6 characters">
            </div>
            <button type="submit" class="btn-primary w-full">Create Account</button>
        </form>
        <p class="mt-4 text-center text-sm text-gray-500">
            Already have an account? <a href="/auth/login" class="text-blue-600 hover:underline">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
