{% extends "base.html" %}
{% block title %}Login — {{ app_name }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="card p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Sign in to {{ app_name }}</h1>
        <form
            hx-post="/auth/login"
            hx-target="this"
            hx-swap="outerHTML"
            class="space-y-4"
        >
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required class="input-field" placeholder="you@example.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required class="input-field" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary w-full">Sign In</button>
        </form>
        <p class="mt-4 text-center text-sm text-gray-500">
            Don't have an account? <a href="/auth/register" class="text-blue-600 hover:underline">Register</a>
        </p>
    </div>
</div>
{% endblock %}
